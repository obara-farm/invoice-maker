<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>請求書作成ツール - 小原家畜診療所</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root{
    --paper:#FFFFFF;
    --bg:#EFEDE6;
    --ink:#1F1F1F;
    --ink-soft:#5B5B5B;
    --line:#CFCBC0;
    --line-dark:#1F1F1F;
    --accent:#3E6B5C;
    --accent-soft:#3E6B5C1a;
    --box:#F4F2EC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Noto Sans JP',sans-serif;
    color:var(--ink);
  }
  .app{max-width:900px;margin:0 auto;padding:24px 18px 80px;}
  h1.brand{
    font-family:'Noto Serif JP',serif;
    font-size:18px;font-weight:700;margin:0 0 2px;letter-spacing:.03em;
  }
  .brand-sub{font-size:11px;color:var(--ink-soft);margin-bottom:16px;}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .sync-status{font-size:11.5px;color:var(--ink-soft);margin-left:2px;}
  .sync-status.ok{color:var(--accent);}
  .sync-status.error{color:#a83a2c;}
  .sync-status.syncing{color:var(--ink-soft);}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;
  }
  .modal-box{background:#fff;border-radius:10px;padding:22px;max-width:360px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.2);}
  .modal-msg{font-size:13.5px;line-height:1.7;margin-bottom:18px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:24px;font-size:12.5px;
    opacity:0;transition:opacity .25s, transform .25s;z-index:1100;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  button{
    font-family:'Noto Sans JP',sans-serif;
    border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:3px;font-size:12.5px;cursor:pointer;
  }
  button:hover{background:#f2f0e9;}
  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
    outline:2px solid var(--accent);outline-offset:1px;
  }
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.primary:hover{background:#325749;}
  button.ghost{border-color:transparent;color:var(--ink-soft);text-decoration:underline;padding:8px 4px;}
  button.danger{color:#a83a2c;}

  .sheet{background:var(--paper);border:1px solid var(--line);padding:36px 40px;position:relative;}

  .doc-title{text-align:center;font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;letter-spacing:.4em;margin:0 0 22px;padding-left:.4em;}

  .head-cols{display:flex;justify-content:space-between;gap:28px;margin-bottom:14px;}
  .head-col{flex:1;font-size:12.5px;line-height:1.9;}
  .client-name-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;}
  .client-name-row input.cname{font-size:16px;font-weight:700;border:none;border-bottom:1px solid var(--ink);background:transparent;flex:1;padding:2px 0;font-family:'Noto Sans JP',sans-serif;}
  .client-name-row span{font-size:13px;color:var(--ink-soft);white-space:nowrap;}
  .head-col input, .head-col textarea{border:none;background:transparent;font-size:12.5px;color:var(--ink);font-family:'Noto Sans JP',sans-serif;width:100%;padding:1px 0;}
  .head-col textarea{resize:none;height:38px;}
  .contact-row{display:flex;align-items:baseline;gap:6px;}
  .contact-row input{flex:1;}
  .contact-row span{font-size:12.5px;color:var(--ink-soft);}
  .client-quick{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .client-quick button{font-size:10.5px;padding:4px 9px;color:var(--ink-soft);}
  .client-quick-actions{display:flex;gap:10px;margin-top:5px;}
  .client-quick-actions button{font-size:10.5px;padding:3px 2px;}

  .issuer-block{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
  .issuer-block img{width:46px;height:46px;flex-shrink:0;}
  .issuer-text{flex:1;font-size:12.5px;line-height:1.75;}
  .issuer-text .iname{font-size:14px;font-weight:700;margin-bottom:2px;}
  .issuer-text input{border:none;background:transparent;font-size:12.5px;width:100%;font-family:'Noto Sans JP',sans-serif;color:var(--ink);}
  .issuer-text input.iname{font-size:14px;font-weight:700;}

  .meta-block{margin-top:10px;font-size:12.5px;line-height:2;}
  .meta-row{display:flex;justify-content:flex-end;gap:6px;}
  .meta-row .ml{color:var(--ink-soft);width:82px;text-align:justify;text-align-last:justify;}
  .meta-row input{border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:12.5px;width:130px;color:var(--ink);}

  .subject-row{font-size:13px;margin:18px 0 4px;display:flex;align-items:baseline;gap:4px;}
  .subject-row input{flex:1;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:13px;border-bottom:1px dotted var(--line);padding:2px 4px;}
  .divider-bar{height:6px;background:linear-gradient(90deg,var(--accent),var(--accent) 70%,transparent 70%);margin-bottom:18px;width:220px;}

  .amount-due{border:2px solid var(--ink);padding:10px 18px;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px;}
  .amount-due .label{font-size:13px;font-weight:700;}
  .amount-due .value{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;}

  table.items{width:100%;border-collapse:collapse;margin-bottom:4px;table-layout:fixed;}
  table.items thead th{font-size:11px;color:var(--ink-soft);font-weight:500;text-align:center;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);padding:5px 4px;}
  table.items thead th.left{text-align:left;}
  table.items tbody td{border-bottom:1px solid var(--line);padding:5px 4px;font-size:12.5px;vertical-align:top;}
  table.items tbody td input, table.items tbody td select, table.items tbody td textarea{
    width:100%;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:12.5px;color:var(--ink);resize:none;
  }
  table.items tbody td textarea{height:34px;}
  table.items tbody td.num input{text-align:right;}
  table.items tbody td.ctr input, table.items tbody td.ctr select{text-align:center;}
  table.items tbody td.amt{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  table.items tbody td.rm{width:22px;text-align:center;}
  table.items tbody td.rm button{border:none;background:none;color:var(--ink-soft);font-size:13px;padding:0;}
  table.items tbody td.rm button:hover{color:#a83a2c;}
  table.items tbody tr.blank td{border-bottom:1px solid var(--line);height:26px;}

  .quickadd{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 8px;}
  .quickadd button{font-size:10.5px;padding:4px 9px;color:var(--ink-soft);}
  .egg-builder-sub{font-weight:400;font-size:11.5px;color:var(--ink-soft);margin-left:6px;}
  .egg-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap;}
  .egg-row-label{font-size:11.5px;color:var(--ink-soft);width:36px;flex-shrink:0;}
  .egg-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .egg-btns button{
    font-size:12.5px;padding:8px 14px;min-height:38px;border-radius:20px;
    border:1.5px solid var(--line);background:#fff;color:var(--ink);
  }
  .egg-btns button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  .egg-btns button:disabled{opacity:.4;cursor:not-allowed;}
  .egg-add-mini{display:flex;gap:4px;align-items:center;}
  .egg-add-mini input{border:1px solid var(--line);border-radius:16px;font-size:11.5px;padding:6px 10px;width:100px;font-family:'Noto Sans JP',sans-serif;}
  .egg-add-mini button{border:1px solid var(--line);border-radius:50%;width:28px;height:28px;font-size:14px;padding:0;background:#fff;}
  .egg-preview{font-size:13px;padding:9px 0;border-top:1px dashed var(--line);margin-top:2px;}
  .egg-preview .egg-price-hint{font-size:11px;color:var(--accent);margin-left:8px;}
  .egg-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .egg-actions input{border:1px solid var(--line);border-radius:6px;font-size:12.5px;padding:8px 10px;font-family:'Noto Sans JP',sans-serif;width:110px;}
  .egg-actions button.primary{padding:10px 16px;}

  .qa-search{margin-bottom:10px;}
  .qa-search input{
    width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:8px;
    font-family:'Noto Sans JP',sans-serif;font-size:14px;background:#fff;color:var(--ink);
  }
  .qa-search input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  .qa-accordion{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
  .qa-cat{border:1.5px solid var(--line);border-radius:8px;background:#fff;overflow:hidden;}
  .qa-cat[data-nomatch="1"]{display:none;}
  .qa-cat-summary{
    cursor:pointer;padding:11px 14px;font-size:13.5px;font-weight:700;
    background:var(--cat-color,var(--box));color:var(--ink);
    display:flex;justify-content:space-between;align-items:center;
    list-style:none;user-select:none;
  }
  .qa-cat-summary::-webkit-details-marker{display:none;}
  .qa-cat-summary .qa-count{font-weight:400;font-size:11.5px;color:var(--ink-soft);margin-left:6px;}
  .qa-cat-summary .qa-chevron{font-size:11px;color:var(--ink-soft);transition:transform .15s;}
  .qa-cat[open] .qa-chevron{transform:rotate(180deg);}
  .qa-cat-body{padding:12px 14px;display:flex;flex-wrap:wrap;gap:8px;border-top:1px solid var(--line);}
  .qa-cat-body.egg-body{flex-direction:column;flex-wrap:nowrap;align-items:stretch;}
  .qa-cat button{
    font-size:13px;padding:10px 15px;min-height:42px;border-radius:8px;
    border:1px solid var(--line);background:#fff;color:var(--ink);
  }
  .qa-cat button:hover{background:var(--box);}
  .qa-cat button:active{transform:scale(.97);}
  .qa-cat button[data-hidden="1"]{display:none;}

  .preset-mgr{background:var(--box);border:1px solid var(--line);padding:14px 16px;margin-bottom:22px;}
  .preset-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .preset-cat-head{font-size:11px;font-weight:700;color:var(--accent);margin:8px 0 2px;}
  .preset-cat-head:first-child{margin-top:0;}
  .preset-row{display:flex;gap:6px;align-items:center;}
  .preset-row input{border:1px solid var(--line);background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:5px 7px;border-radius:3px;}
  .preset-row input.pname{flex:1;}
  .preset-row input.pcat{width:90px;}
  .preset-row input.punit{width:60px;}
  .preset-row input.pprice{width:90px;}
  .preset-row button{font-size:11px;padding:5px 9px;}
  .preset-new{display:flex;gap:6px;align-items:center;}
  .preset-new input{border:1px solid var(--line);background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:6px 8px;border-radius:3px;}
  .preset-new input#newPresetName{flex:1;}
  .preset-empty{font-size:11.5px;color:var(--ink-soft);padding:4px 0;}

  .bottom-row{display:flex;gap:24px;margin-bottom:22px;align-items:flex-start;}
  .taxbreak{flex:1.3;}
  .taxbreak-title{font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  table.taxtable{width:100%;border-collapse:collapse;font-size:11.5px;}
  table.taxtable th, table.taxtable td{border:1px solid var(--line);padding:4px 6px;text-align:right;}
  table.taxtable th{background:var(--box);font-weight:500;color:var(--ink-soft);}
  table.taxtable td.rate-label{text-align:left;}

  .totals{flex:1;max-width:220px;}
  .totals-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--line);}
  .totals-row.grand{border-top:2px solid var(--ink);border-bottom:none;margin-top:2px;padding-top:8px;font-family:'Noto Serif JP',serif;font-size:17px;font-weight:700;}

  .section{margin-bottom:16px;}
  .section-label{font-size:11px;color:var(--ink-soft);border-bottom:1px solid var(--line);padding-bottom:3px;margin-bottom:6px;}
  .section textarea{width:100%;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--ink);resize:none;line-height:1.7;}
  .section.bank textarea{height:56px;}
  .section.note textarea{height:36px;}

  .page-no{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:10px;}

  .history{margin-top:26px;}
  .history h2{font-family:'Noto Serif JP',serif;font-size:14px;margin-bottom:10px;}
  .history-list{display:flex;flex-direction:column;gap:6px;}
  .history-item{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);padding:9px 13px;font-size:12px;}
  .history-item .hi-main{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;}
  .history-item .hi-no{color:var(--ink-soft);font-variant-numeric:tabular-nums;}
  .history-item .hi-amt{font-weight:700;font-variant-numeric:tabular-nums;}
  .history-item .hi-actions button{font-size:11px;padding:4px 9px;}
  .empty-hist{color:var(--ink-soft);font-size:12px;padding:8px 0;}

  .stats-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .stats-head select{font-family:'Noto Sans JP',sans-serif;font-size:12.5px;padding:7px 10px;border:1px solid var(--line);border-radius:5px;background:#fff;}
  .stats-cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
  .stats-card{flex:1;min-width:140px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 16px;}
  .stats-card .sc-label{font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;}
  .stats-card .sc-value{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;}
  .stats-subhead{font-family:'Noto Serif JP',serif;font-size:13.5px;margin:18px 0 8px;}
  table.stats-table{width:100%;border-collapse:collapse;margin-bottom:6px;font-size:12.5px;background:#fff;}
  table.stats-table th{text-align:left;font-size:11px;color:var(--ink-soft);font-weight:500;border-bottom:1px solid var(--ink);padding:6px 10px;}
  table.stats-table th.num, table.stats-table td.num{text-align:right;}
  table.stats-table td{padding:7px 10px;border-bottom:1px solid var(--line);}
  table.stats-table tr:last-child td{border-bottom:none;}

  @media print{
    body{background:#fff;}
    .toolbar,.history,.quickadd,.rm,.preset-mgr,.client-mgr,.qa-search,.qa-accordion,.client-quick,.client-quick-actions{display:none !important;}
    .app{padding:0;max-width:none;}
    h1.brand,.brand-sub{display:none;}
    .sheet{border:none;padding:0;}
    input,textarea,select{color:var(--ink) !important;}
  }
  @media (max-width:640px){
    .sheet{padding:22px 16px;}
    .head-cols{flex-direction:column;}
    .bottom-row{flex-direction:column;}
    .totals{max-width:none;}
  }
</style>
</head>
<body>
<div class="app">
  <h1 class="brand">請求書メーカー</h1>
  <div class="brand-sub">小原家畜診療所 発行用</div>

  <div class="toolbar">
    <button class="primary" id="btnNew">＋ 新規請求書</button>
    <button id="btnSave">保存</button>
    <button id="btnPrint">印刷 / PDF出力</button>
    <button class="ghost" id="btnToggleHist">履歴を表示</button>
    <button class="ghost" id="btnToggleStats">集計を見る</button>
    <button class="ghost" id="btnExportBackup">バックアップを書き出す</button>
    <button class="ghost" id="btnImportBackup">バックアップを読み込む</button>
    <input type="file" id="importFileInput" accept="application/json" style="display:none;">
    <span class="sync-status" id="syncStatus"></span>
  </div>

  <div class="sheet" id="sheet">
    <div class="doc-title">請求書</div>

    <div class="head-cols">
      <div class="head-col">
        <div class="client-name-row">
          <input class="cname" id="clientName" placeholder="〇〇牧場">
          <span>御中</span>
        </div>
        <input id="clientZip" placeholder="〒000-0000">
        <input id="clientAddr" placeholder="住所">
        <div class="contact-row">
          <input id="clientPerson" placeholder="ご担当者名">
          <span>様</span>
        </div>
        <div class="client-quick" id="clientQuickContainer"></div>
        <div class="client-quick-actions">
          <button class="ghost" id="btnSaveClientPreset" type="button">＋今の入力を取引先として保存</button>
          <button class="ghost" id="btnToggleClientMgr" type="button">取引先を管理</button>
        </div>
      </div>

function setSyncStatus(text, cls){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.textContent = text;
  el.className = 'sync-status ' + (cls||'');
}

function waitForAuth(){
  return new Promise((resolve, reject) => {
    onAuthStateChanged(auth, (user) => {
      if(user) resolve(user);
    });
    signInAnonymously(auth).catch(reject);
  });
}

function yen(n){ return Math.round(n).toLocaleString('ja-JP'); }
function todayStr(d){ d = d||new Date(); return d.toISOString().slice(0,10); }
function lastDayOfNextMonth(dateStr){
  const d = new Date(dateStr);
  const nextMonth = d.getMonth()+2;
  const ld = new Date(d.getFullYear(), nextMonth, 0);
  return todayStr(ld);
}

async function loadStore(){
  setSyncStatus('🔄 読み込み中…', 'syncing');
  try{
    await waitForAuth();
    const snap = await get(dataRef);
    if(snap.exists() && snap.val() && snap.val().json){
      store = JSON.parse(snap.val().json);
    }
    syncReady = true;
    setSyncStatus('✅ 同期済み', 'ok');
  }catch(e){
    console.error('読み込みに失敗しました', e);
    setSyncStatus('⚠️ オフライン（この端末のみ）', 'error');
  }
}
async function persistStore(){
  try{
    suppressNextSnapshot = true;
    await set(dataRef, { json: JSON.stringify(store), updatedAt: Date.now() });
    setSyncStatus('✅ 同期済み', 'ok');
  }catch(e){
    console.error('保存に失敗しました', e);
    setSyncStatus('⚠️ 保存に失敗しました', 'error');
  }
}

function startRealtimeSync(){
  onValue(dataRef, (snap) => {
    if(suppressNextSnapshot){ suppressNextSnapshot = false; return; }
    if(!syncReady || !snap.exists()) return;
    const val = snap.val();
    if(!val || !val.json) return;
    try{
      store = JSON.parse(val.json);
      renderQuickadd();
      renderClientQuick();
      renderHistory();
      const statsPanel = document.getElementById('statsPanel');
      if(statsPanel.style.display !== 'none') renderStats();
      setSyncStatus('✅ 他の端末の更新を反映しました', 'ok');
    }catch(e){ console.error(e); }
  }, (err) => {
    console.error('同期エラー', err);
    setSyncStatus('⚠️ オフライン（この端末のみ）', 'error');
  });
}


function genInvoiceNo(){
  store.seq = (store.seq||0) + 1;
  return String(store.seq).padStart(3,'0');
}

function blankItemRow(name='', unit='', qty=1, price=0, taxCat='10', date=''){
  return { date, name, unit, qty, price, taxCat };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderItems(){
  const body = document.getElementById('itemsBody');
  body.innerHTML = '';
  items.forEach((it, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${escapeHtml(it.date)}" data-idx="${idx}" data-field="date" placeholder="R7/9/4"></td>
      <td><textarea data-idx="${idx}" data-field="name" placeholder="品目名・備考">${escapeHtml(it.name)}</textarea></td>
      <td class="num"><input type="number" step="any" value="${it.price}" data-idx="${idx}" data-field="price"></td>
      <td class="num"><input type="number" step="any" value="${it.qty}" data-idx="${idx}" data-field="qty"></td>
      <td class="ctr"><input type="text" value="${escapeHtml(it.unit)}" data-idx="${idx}" data-field="unit"></td>
      <td class="ctr">
        <select data-idx="${idx}" data-field="taxCat">
          <option value="10" ${it.taxCat==='10'?'selected':''}>10%</option>
          <option value="free" ${it.taxCat==='free'?'selected':''}>非課税</option>
        </select>
      </td>
      <td class="amt">¥${yen(it.qty*it.price)}</td>
      <td class="rm"><button data-idx="${idx}" class="rmBtn">✕</button></td>
    `;
    body.appendChild(tr);
  });
  // trailing blank template rows for print look
  const blanksNeeded = Math.max(0, 4 - items.length);
  for(let i=0;i<blanksNeeded;i++){
    const tr = document.createElement('tr');
    tr.className = 'blank';
    tr.innerHTML = '<td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td>';
    body.appendChild(tr);
  }

  body.querySelectorAll('input,select,textarea').forEach(inp => {
    const evt = inp.tagName === 'SELECT' ? 'change' : 'input';
    inp.addEventListener(evt, e => {
      const idx = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      const val = (field === 'qty' || field === 'price') ? (parseFloat(e.target.value)||0) : e.target.value;
      items[idx][field] = val;
      recalc();
      const row = body.children[idx];
      const amtCell = row.querySelector('.amt');
      if(amtCell) amtCell.textContent = '¥' + yen(items[idx].qty*items[idx].price);
    });
  });
  body.querySelectorAll('.rmBtn').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = +e.target.dataset.idx;
      items.splice(idx,1);
      renderItems();
      recalc();
    });
  });
}

function recalc(){
  let ex10 = 0, exFree = 0;
  items.forEach(it => {
    const amt = it.qty*it.price;
    if(it.taxCat === 'free') exFree += amt; else ex10 += amt;
  });
  const tax10 = Math.round(ex10 * 0.10);
  const subtotal = ex10 + exFree;
  const taxTotal = tax10;
  const total = subtotal + taxTotal;

  document.getElementById('tb10-ex').textContent = '¥'+yen(ex10);
  document.getElementById('tb10-tax').textContent = '¥'+yen(tax10);
  document.getElementById('tb10-in').textContent = '¥'+yen(ex10+tax10);
  document.getElementById('tbfree-ex').textContent = '¥'+yen(exFree);
  document.getElementById('tbfree-tax').textContent = '¥0';
  document.getElementById('tbfree-in').textContent = '¥'+yen(exFree);

  document.getElementById('subtotal').textContent = '¥'+yen(subtotal);
  document.getElementById('taxAmount').textContent = '¥'+yen(taxTotal);
  document.getElementById('grandTotal').textContent = '¥'+yen(total);
  document.getElementById('dueAmount').textContent = yen(total);
}

  document.getElementById('footerNote').value = store.footerNote || document.getElementById('footerNote').value;

  renderItems();
  recalc();
}

function collectCurrentInvoice(){
  let ex10=0, exFree=0;
  items.forEach(it=>{ const amt=it.qty*it.price; if(it.taxCat==='free') exFree+=amt; else ex10+=amt; });
  const tax10 = Math.round(ex10*0.10);
  const total = ex10+exFree+tax10;
  return {
    id: currentId,
    invNo: document.getElementById('invNo').value,
    invDate: document.getElementById('invDate').value,
    dueDate: document.getElementById('dueDate').value,
    subject: document.getElementById('subject').value,
    clientName: document.getElementById('clientName').value,
    clientZip: document.getElementById('clientZip').value,
    clientAddr: document.getElementById('clientAddr').value,
    clientPerson: document.getElementById('clientPerson').value,
    issuerName: document.getElementById('issuerName').value,
    issuerRegNo: document.getElementById('issuerRegNo').value,
    issuerZip: document.getElementById('issuerZip').value,
    issuerAddr: document.getElementById('issuerAddr').value,
    issuerTel: document.getElementById('issuerTel').value,
    items: items,
    bankInfo: document.getElementById('bankInfo').value,
    footerNote: document.getElementById('footerNote').value,
    total: total,
    savedAt: new Date().toISOString()
  };
}

function loadInvoiceIntoForm(inv){
  currentId = inv.id;
  document.getElementById('invNo').value = inv.invNo;
  document.getElementById('invDate').value = inv.invDate;
  document.getElementById('dueDate').value = inv.dueDate;
  document.getElementById('subject').value = inv.subject;
  document.getElementById('clientName').value = inv.clientName;
  document.getElementById('clientZip').value = inv.clientZip;
  document.getElementById('clientAddr').value = inv.clientAddr;
  document.getElementById('clientPerson').value = inv.clientPerson;
  document.getElementById('issuerName').value = inv.issuerName;
  document.getElementById('issuerRegNo').value = inv.issuerRegNo;
  document.getElementById('issuerZip').value = inv.issuerZip;
  document.getElementById('issuerAddr').value = inv.issuerAddr;
  document.getElementById('issuerTel').value = inv.issuerTel;
  document.getElementById('bankInfo').value = inv.bankInfo;
  document.getElementById('footerNote').value = inv.footerNote;
  items = inv.items.map(it => ({...it}));
  renderItems();
  recalc();
}

async function saveCurrentInvoice(){
  const inv = collectCurrentInvoice();
  const existingIdx = store.invoices.findIndex(x => x.id === inv.id);
  if(existingIdx >= 0){ store.invoices[existingIdx] = inv; }
  else { store.invoices.unshift(inv); }
  store.issuerProfile = { name: inv.issuerName, regNo: inv.issuerRegNo, zip: inv.issuerZip, addr: inv.issuerAddr, tel: inv.issuerTel };
  store.bankInfo = inv.bankInfo;
  store.footerNote = inv.footerNote;
  await persistStore();
  renderHistory();
}

function renderHistory(){
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if(!store.invoices || store.invoices.length === 0){
    list.innerHTML = '<div class="empty-hist">まだ保存された請求書はありません。</div>';
    return;
  }
  store.invoices.forEach(inv => {
    const row = document.createElement('div');
    row.className = 'history-item';
    row.innerHTML = `
      <div class="hi-main">

        <span>${escapeHtml(inv.clientName || '（宛先未入力）')}</span>

        <span>${escapeHtml(inv.invDate||'')}</span>
      </div>
      <div class="hi-actions">
        <button class="loadBtn" data-id="${inv.id}">開く</button>
        <button class="danger delBtn" data-id="${inv.id}">削除</button>
      </div>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.loadBtn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const inv = store.invoices.find(x=>x.id===e.target.dataset.id);
      if(inv) loadInvoiceIntoForm(inv);
    });
  });
  list.querySelectorAll('.delBtn').forEach(btn=>{
    btn.addEventListener('click', async e=>{
      store.invoices = store.invoices.filter(x=>x.id!==e.target.dataset.id);
      await persistStore();
      renderHistory();
    });
  });
}

function groupByCategory(presets){
  const groups = {};
  const order = [];
  presets.forEach(p => {
    const cat = p.category && p.category.trim() ? p.category.trim() : 'その他';
    if(!groups[cat]){ groups[cat] = []; order.push(cat); }
    groups[cat].push(p);
  });
  return { groups, order };
}

function applyQaSearch(){
  const q = (document.getElementById('qaSearch').value || '').trim().toLowerCase();
  document.querySelectorAll('.qa-cat').forEach(cat => {
    if(cat.dataset.eggBuilder === '1'){ cat.dataset.nomatch = '0'; return; }
    let anyMatch = !q;
    cat.querySelectorAll('button[data-search]').forEach(btn => {
      const match = !q || btn.dataset.search.includes(q);
      btn.dataset.hidden = match ? '0' : '1';
      if(match) anyMatch = true;
    });
    cat.dataset.nomatch = anyMatch ? '0' : '1';
    if(q && anyMatch) cat.open = true;

function renderPresetMgr(){
  const list = document.getElementById('presetList');
  list.innerHTML = '';
  const presets = store.presets||[];
  if(presets.length === 0){
    list.innerHTML = '<div class="preset-empty">プリセットはまだありません。下から追加してください。</div>';
    updateCategoryDatalist();
    return;
  }
  const { groups, order } = groupByCategory(presets);
  order.forEach(cat => {
    const catHead = document.createElement('div');
    catHead.className = 'preset-cat-head';
    catHead.textContent = cat;
    list.appendChild(catHead);
    groups[cat].forEach(p => {
      const idx = presets.indexOf(p);
      const row = document.createElement('div');
      row.className = 'preset-row';
      row.innerHTML = `
        <input type="text" class="pcat" data-idx="${idx}" data-field="category" value="${escapeHtml(p.category||'')}" placeholder="カテゴリ" style="width:90px;" list="categoryList">
        <input type="text" class="pname" data-idx="${idx}" data-field="name" value="${escapeHtml(p.name)}">
        <input type="text" class="punit" data-idx="${idx}" data-field="unit" value="${escapeHtml(p.unit)}" placeholder="単位">
        <input type="number" class="pprice" data-idx="${idx}" data-field="price" value="${p.price||0}" placeholder="単価">
        <select class="ptax" data-idx="${idx}" data-field="taxCat" style="width:78px;">
          <option value="10" ${(!p.taxCat || p.taxCat==='10')?'selected':''}>10%</option>
          <option value="free" ${p.taxCat==='free'?'selected':''}>非課税</option>
        </select>
        <button class="danger delPreset" data-idx="${idx}">削除</button>
      `;
      list.appendChild(row);
    });
  });
  list.querySelectorAll('input,select').forEach(inp => {
    const evt = inp.tagName === 'SELECT' ? 'change' : 'change';
    inp.addEventListener(evt, async e => {
      const idx = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      const val = field === 'price' ? (parseFloat(e.target.value)||0) : e.target.value;
      store.presets[idx][field] = val;
      await persistStore();
      renderQuickadd();
      renderPresetMgr();
    });
  });
  list.querySelectorAll('.delPreset').forEach(btn => {
    btn.addEventListener('click', async e => {
      const idx = +e.target.dataset.idx;
      store.presets.splice(idx,1);
      await persistStore();
      renderPresetMgr();
      renderQuickadd();
    });
  });
  updateCategoryDatalist();
}

const DEFAULT_BREEDS = ['黒毛和種','褐毛和種'];
const EGG_TYPES = ['指定なし','新鮮胚','凍結胚','培養胚'];
const EGG_RANKS = ['指定なし','Aランク','Bランク'];
let eggState = { breed: null, type: '指定なし', rank: '指定なし' };

function eggComposeName(){
  const breed = eggState.breed || (store.breeds && store.breeds[0]) || DEFAULT_BREEDS[0];
  let name = `受精卵（${breed}）`;
  if(eggState.type && eggState.type !== '指定なし'){
    name += eggState.type;
    if(eggState.rank && eggState.rank !== '指定なし'){
      name += '-' + eggState.rank;
    }
  }
  return name;
}

function eggPriceKey(){
  return `${eggState.breed}|${eggState.type}|${eggState.rank}`;
}

function renderEggBuilder(){
  const breeds = store.breeds && store.breeds.length ? store.breeds : DEFAULT_BREEDS;
  if(!eggState.breed) eggState.breed = breeds[0];

  const breedBox = document.getElementById('eggBreedBtns');
  if(!breedBox) return; // egg card not in DOM yet
  breedBox.innerHTML = '';
  breeds.forEach(b => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = b;
    if(b === eggState.breed) btn.classList.add('active');
    btn.addEventListener('click', () => { eggState.breed = b; onEggSelectionChange(); });
    breedBox.appendChild(btn);
  });

  const typeBox = document.getElementById('eggTypeBtns');
  typeBox.innerHTML = '';
  EGG_TYPES.forEach(t => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = t;
    if(t === eggState.type) btn.classList.add('active');
    btn.addEventListener('click', () => {
      eggState.type = t;
      if(t === '指定なし') eggState.rank = '指定なし';
      onEggSelectionChange();
    });
    typeBox.appendChild(btn);
  });

  const rankBox = document.getElementById('eggRankBtns');
  rankBox.innerHTML = '';
  EGG_RANKS.forEach(r => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = r;
    if(r === eggState.rank) btn.classList.add('active');
    const disabled = eggState.type === '指定なし';
    if(disabled) btn.disabled = true;
    btn.addEventListener('click', () => { eggState.rank = r; onEggSelectionChange(); });
    rankBox.appendChild(btn);
  });

  document.getElementById('eggPreviewName').textContent = eggComposeName();
  applyEggRememberedPrice();
}

function applyEggRememberedPrice(){
  const priceInput = document.getElementById('eggPrice');
  const hint = document.getElementById('eggPriceHint');
  const remembered = (store.eggPrices||{})[eggPriceKey()];
  if(remembered !== undefined){
    priceInput.value = remembered;
    hint.textContent = '（前回の単価を自動入力）';
  }else{
    priceInput.value = '';
    hint.textContent = '';
  }
}

function onEggSelectionChange(){
  renderEggBuilder();
}

function bindEggBuilderEvents(){
  document.getElementById('btnAddBreed').addEventListener('click', async () => {
    const val = document.getElementById('newBreedInput').value.trim();
    if(!val) return;
    store.breeds = store.breeds && store.breeds.length ? store.breeds : DEFAULT_BREEDS.slice();
    if(!store.breeds.includes(val)) store.breeds.push(val);
    eggState.breed = val;
    document.getElementById('newBreedInput').value = '';
    await persistStore();
    renderEggBuilder();
  });

  document.getElementById('btnEggAdd').addEventListener('click', async () => {
    const name = eggComposeName();
    const unit = document.getElementById('eggUnit').value.trim() || '頭';
    const price = parseFloat(document.getElementById('eggPrice').value) || 0;
    items.push(blankItemRow(name, unit, 1, price));
    renderItems();
    recalc();
    // remember this price for next time the same combination is used
    store.eggPrices = store.eggPrices || {};
    store.eggPrices[eggPriceKey()] = price;
    await persistStore();
    applyEggRememberedPrice();
  });
}

function filterInvoicesByPeriod(period){
  const now = new Date();
  return (store.invoices||[]).filter(inv => {
    if(period === 'all') return true;
    if(!inv.invDate) return false;
    const d = new Date(inv.invDate);
    if(isNaN(d)) return false;
    if(period === 'year') return d.getFullYear() === now.getFullYear();
    if(period === 'month') return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    return true;
  });
}

function renderStats(){
  const period = document.getElementById('statsPeriod').value;
  const invoices = filterInvoicesByPeriod(period);

  let totalRevenue = 0;
  const eggMap = {};   // name -> {qty, amount, unit}
  const otherMap = {}; // name -> {qty, amount, unit}
  const clientMap = {}; // clientName -> amount

  invoices.forEach(inv => {
    totalRevenue += inv.total || 0;
    const cname = inv.clientName || '（宛先未入力）';
    clientMap[cname] = (clientMap[cname]||0) + (inv.total||0);
    (inv.items||[]).forEach(it => {
      if(!it.name || (!it.qty && !it.price)) return;
      const amount = (it.qty||0) * (it.price||0);
      const target = it.name.trim().startsWith('受精卵') ? eggMap : otherMap;
      if(!target[it.name]) target[it.name] = { qty:0, amount:0, unit: it.unit||'' };
      target[it.name].qty += (it.qty||0);
      target[it.name].amount += amount;
    });
  });

  const invoiceCount = invoices.length;
  const eggTotalQty = Object.values(eggMap).reduce((s,v)=>s+v.qty, 0);

  document.getElementById('statsCards').innerHTML = `
    <div class="stats-card"><div class="sc-label">請求件数</div><div class="sc-value">${invoiceCount}件</div></div>
    <div class="stats-card"><div class="sc-label">売上合計（税込）</div><div class="sc-value">¥${yen(totalRevenue)}</div></div>
    <div class="stats-card"><div class="sc-label">受精卵 販売合計</div><div class="sc-value">${yen(eggTotalQty)}頭</div></div>
  `;

  renderStatsTable('eggStatsTable', eggMap, '受精卵はまだ記録がありません。');
  renderStatsTable('otherStatsTable', otherMap, 'その他品目の記録はまだありません。');

  const clientRows = Object.entries(clientMap).sort((a,b)=>b[1]-a[1]);
  const clientTable = document.getElementById('clientStatsTable');
  if(clientRows.length === 0){
    clientTable.innerHTML = '<tr><td class="empty-hist">記録がまだありません。</td></tr>';
  }else{
    clientTable.innerHTML = `
      <thead><tr><th>取引先</th><th class="num">合計金額</th></tr></thead>
      <tbody>${clientRows.map(([name,amt]) => `<tr><td>${escapeHtml(name)}</td><td class="num">¥${yen(amt)}</td></tr>`).join('')}</tbody>
    `;
  }
}

function renderStatsTable(elId, map, emptyMsg){
  const rows = Object.entries(map).sort((a,b)=>b[1].amount-a[1].amount);
  const table = document.getElementById(elId);
  if(rows.length === 0){
    table.innerHTML = `<tr><td class="empty-hist">${emptyMsg}</td></tr>`;
    return;
  }
  table.innerHTML = `
    <thead><tr><th>品目名</th><th class="num">数量</th><th class="num">金額（税抜）</th></tr></thead>
    <tbody>${rows.map(([name,v]) => `<tr><td>${escapeHtml(name)}</td><td class="num">${yen(v.qty)}${escapeHtml(v.unit)}</td><td class="num">¥${yen(v.amount)}</td></tr>`).join('')}</tbody>
  `;
}

const ADDONS_V3_PRESETS = [
  { name:'子宮内還流回収・検卵作業（経費込み）', unit:'頭', price:50000, category:'採卵・処置' },
  { name:'新鮮胚処理', unit:'個', price:1000, category:'採卵・処置' },
  { name:'PG（ダルマジン）', unit:'V', price:800, category:'薬品' },
  { name:'Transfer-胚培養メディウム', unit:'V', price:9000, category:'薬品' },
  { name:'※交通費', unit:'km', price:200, category:'経費', taxCat:'free' }
];
const ADDONS_V3_CLIENTS = [
  { name:'村井牧場', zip:'〒083-0046', addr:'中川郡池田町東台618番地', person:'村井　慎平' }
];

(async function init(){
  await loadStore();
  if(!store.presets || store.presets.length === 0){
    store.presets = DEFAULT_PRESETS.map(p => ({...p}));
  }
  // migration: egg builder now covers everything under 受精卵, so drop old flat presets in that category
  if(!store.eggMigrationDone){
    const before = store.presets.length;
    store.presets = store.presets.filter(p => (p.category||'').trim() !== '受精卵');
    store.eggMigrationDone = true;
    if(store.presets.length !== before) await persistStore();
  }
  if(!store.clients || store.clients.length === 0){
    store.clients = DEFAULT_CLIENTS.map(c => ({...c}));
  }
  // migration: add items/client found in 村井牧場 invoice, skipping anything already present by name
  if(!store.migrationV3Done){
    let changed = false;
    const existingPresetNames = new Set((store.presets||[]).map(p => p.name));
    ADDONS_V3_PRESETS.forEach(p => {
      if(!existingPresetNames.has(p.name)){
        store.presets.push({ id: 'p' + Date.now() + Math.random().toString(36).slice(2,6), ...p });
        changed = true;
      }
    });
    const existingClientNames = new Set((store.clients||[]).map(c => c.name));
    ADDONS_V3_CLIENTS.forEach(c => {
      if(!existingClientNames.has(c.name)){
        store.clients.push({ id: 'c' + Date.now() + Math.random().toString(36).slice(2,6), ...c });
        changed = true;
      }
    });
    store.migrationV3Done = true;
    await persistStore();
  }
  // fix: 交通費 should always be non-taxable, even if it was added before this rule existed
  {
    const kotsu = (store.presets||[]).find(p => p.name === '※交通費');
    if(kotsu && kotsu.taxCat !== 'free'){
      kotsu.taxCat = 'free';
      await persistStore();
    }
  }
  if(!store.breeds || store.breeds.length === 0){
    store.breeds = DEFAULT_BREEDS.slice();
  }
  renderQuickadd();
  renderClientQuick();
  newInvoice();
  renderHistory();
  startRealtimeSync();
})();

function showConfirmModal(message){
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-msg">${escapeHtml(message)}</div>
        <div class="modal-actions">
          <button class="ghost" id="modalCancel" type="button">キャンセル</button>
          <button class="primary" id="modalOk" type="button">実行する</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#modalCancel').addEventListener('click', () => { overlay.remove(); resolve(false); });
    overlay.querySelector('#modalOk').addEventListener('click', () => { overlay.remove(); resolve(true); });
  });
}

function showToast(message){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => { el.classList.add('show'); }, 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(()=>el.remove(), 300); }, 2600);
}

document.getElementById('importFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const parsed = JSON.parse(reader.result);
      const ok = await showConfirmModal('バックアップを読み込むと、現在のデータ（プリセット・取引先・請求書履歴など）が上書きされます。よろしいですか？');
      if(!ok) return;
      store = parsed;
      await persistStore();
      renderQuickadd();
      renderClientQuick();
      renderHistory();
      newInvoice();
      showToast('バックアップを読み込みました');
    }catch(err){
      showToast('ファイルの読み込みに失敗しました');
      console.error(err);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});
